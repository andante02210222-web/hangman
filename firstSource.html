<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <h1>タブ式表示の作成</h1>
  <script>
    function DWrite(){
	  document.write("どこに書き出されるのかな");
	}
  </script>
</head>
<body>
  <p>下のボタンを押すとfunctionを呼び出します<br>
  ページが全て書き出されたあとのdocuments.writeは<br>
  どこに書き出されるのでしょう？</p>
  <button onClick="DWrite();">document.writeします</button>
</body>
</html>
